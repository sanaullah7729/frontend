name: Deploy and Scan Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  snyk:
    name: Snyk Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Snyk globally
      - name: Install Snyk
        run: npm install -g snyk

      # Authenticate with Snyk using the secret token
      - name: Authenticate with Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Run Snyk test for vulnerabilities with debugging enabled
      - name: Snyk Test for vulnerabilities
        run: snyk test --all-projects --debug
  deploy:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: snyk  # Ensure SonarQube scan is done first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch full API Gateway URL for /receive
        id: fetch-api-url
        run: |
          set -e
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='prod-tickup'].id" --output text)
          STAGE="prod"
          PATH="/receive"
          REGION="${{ secrets.AWS_REGION }}"
          FULL_URL="https://${API_ID}.execute-api.${REGION}.amazonaws.com/${STAGE}${PATH}"
          echo "Resolved API URL: $FULL_URL"
          echo "API_ENDPOINT=$FULL_URL" >> $GITHUB_ENV

      - name: Update App.js with the new POST endpoint
        run: |
          echo "Updating App.js with the new POST endpoint..."
          sed -i "s|https://uti1ng6zpl.execute-api.eu-north-1.amazonaws.com/dev/receive|${{ env.API_ENDPOINT }}|g" src/App.js

      - name: Build Frontend
        run: npm run build

      - name: Deploy to S3
        run: aws s3 sync build/ s3://react-frontend-code-test --delete
